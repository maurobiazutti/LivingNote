default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME") { 'postgres' } %>
  password: <%= ENV.fetch("DB_PASSWORD") { '' } %>
  host: <%= ENV.fetch("DB_HOST") { 'localhost' } %>

development:
  <<: *default
  database: living_note_development

test:
  <<: *default
  database: living_note_test

production:
  primary:
    <<: *default
    database: living_note_production
    username: living_note
    password: <%= ENV["LIVING_NOTE_DATABASE_PASSWORD"] %>
  cache:
    <<: *default
    database: living_note_production
    username: living_note
    password: <%= ENV["LIVING_NOTE_DATABASE_PASSWORD"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: living_note_production
    username: living_note
    password: <%= ENV["LIVING_NOTE_DATABASE_PASSWORD"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: living_note_production
    username: living_note
    password: <%= ENV["LIVING_NOTE_DATABASE_PASSWORD"] %>
    migrations_paths: db/cable_migrate
